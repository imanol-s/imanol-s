[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/blog/overcoming-ingraned-introversion"
  to = "/blog/overcoming-ingrained-introversion/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/overcoming-ingraned-introversion/"
  to = "/blog/overcoming-ingrained-introversion/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/Overcoming-Ingraned-Introversion"
  to = "/blog/overcoming-ingrained-introversion/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/Overcoming-Ingraned-Introversion/"
  to = "/blog/overcoming-ingrained-introversion/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
